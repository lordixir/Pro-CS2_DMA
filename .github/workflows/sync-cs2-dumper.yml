name: Sync CS2 offsets

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Force sync even if local files do not appear older"
        required: false
        default: "false"
  schedule:
    - cron: "0 */1 * * *"

permissions:
  contents: write

concurrency:
  group: sync-cs2-offsets
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      UPSTREAM_OWNER: sezzyaep
      UPSTREAM_REPO: CS2-OFFSETS
      LOCAL_DIR: offset
      LOCAL_INFO: offset/info.json
      LOCAL_CLIENT: offset/client_dll.json
      LOCAL_OFFSETS: offset/offsets.json

    steps:
      - name: Checkout current repository
        uses: actions/checkout@v5

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Check for newer offsets
        id: resolve
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          FORCE: ${{ github.event.inputs.force || 'false' }}
        run: |
          set -euo pipefail

          API_ROOT="https://api.github.com/repos/${UPSTREAM_OWNER}/${UPSTREAM_REPO}"

          # Read local timestamp
          LOCAL_TS=""
          if [ -f "$LOCAL_INFO" ]; then
            LOCAL_TS=$(jq -r '.timestamp // ""' "$LOCAL_INFO")
          fi
          echo "Local timestamp: ${LOCAL_TS:-<none>}"

          # Fetch remote info.json
          REMOTE_TS=$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "${API_ROOT}/contents/info.json?ref=main" \
            | jq -r '.content' \
            | tr -d '\n' \
            | base64 -d \
            | jq -r '.timestamp // ""')

          echo "Remote timestamp: ${REMOTE_TS:-<none>}"

          SHOULD_SYNC="false"
          if [ "${FORCE}" = "true" ]; then
            SHOULD_SYNC="true"
          elif [ ! -f "$LOCAL_INFO" ] || [ ! -f "$LOCAL_CLIENT" ] || [ ! -f "$LOCAL_OFFSETS" ]; then
            SHOULD_SYNC="true"
          elif [ -n "$REMOTE_TS" ] && [ "$REMOTE_TS" \> "$LOCAL_TS" ]; then
            SHOULD_SYNC="true"
          fi

          echo "should_sync=${SHOULD_SYNC}" >> "$GITHUB_OUTPUT"
          echo "remote_ts=${REMOTE_TS}" >> "$GITHUB_OUTPUT"

      - name: Create offset directory
        if: steps.resolve.outputs.should_sync == 'true'
        run: mkdir -p "$LOCAL_DIR"

      - name: Download newest files
        if: steps.resolve.outputs.should_sync == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          API_ROOT="https://api.github.com/repos/${UPSTREAM_OWNER}/${UPSTREAM_REPO}/contents"

          download_file() {
            local remote_path="$1"
            local local_path="$2"

            curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              "${API_ROOT}/${remote_path}?ref=main" \
              | jq -r '.content' \
              | tr -d '\n' \
              | base64 -d \
              > "${local_path}"
          }

          download_file "info.json" "$LOCAL_INFO"
          download_file "client_dll.json" "$LOCAL_CLIENT"
          download_file "offsets.json" "$LOCAL_OFFSETS"

          echo "Downloaded files:"
          echo "  $LOCAL_INFO"
          echo "  $LOCAL_CLIENT"
          echo "  $LOCAL_OFFSETS"

      - name: Commit and push
        if: steps.resolve.outputs.should_sync == 'true'
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "$LOCAL_INFO" "$LOCAL_CLIENT" "$LOCAL_OFFSETS"

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          TS="${{ steps.resolve.outputs.remote_ts }}"
          FORMATTED_TIME=$(date -u -d "$TS" +"%Y-%m-%d %H:%M")
          COMMIT_MSG="offset update: ${FORMATTED_TIME}: sync CS2 offsets"

          git commit -m "$COMMIT_MSG"
          git push

      - name: No update
        if: steps.resolve.outputs.should_sync != 'true'
        run: echo "No newer offset data found. Skip."
